name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build
        working-directory: wrapper
        env:
          GOOS: windows
          GOARCH: amd64
        run: go build -o wrapper.exe -ldflags="-s -w" .

      - name: Upload
        uses: softprops/action-gh-release@v2
        with:
          files: wrapper/wrapper.exe
          generate_release_notes: true
